# Neovim IDE Module
# Full IDE experience in the terminal

id = "nvim-ide"
name = "Neovim IDE"
description = "Neovim configured as a full IDE with LSP, completion, and debugging"
kind = "AppConfig"

# Packages
packages = [
    "neovim",
    "ripgrep",
    "fd",
    "lazygit",
    "nodejs",
    "npm",
]

aur_packages = []

# Conflicts
conflicts = ["vim-minimal"]

# Dependencies
depends = []

# Hooks
post_install = "scripts/setup-nvim.sh"

# Dotfiles to link (must be last - TOML array of tables)
[[dotfiles]]
source = "config/nvim"
target = "~/.config/nvim"
link = true
