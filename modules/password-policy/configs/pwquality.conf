# Iron Password Quality Configuration
# Deployed by iron-arch password-policy module

# Minimum password length
minlen = 12

# Require at least one of each character class
dcredit = -1
ucredit = -1
lcredit = -1
ocredit = -1

# Minimum number of character classes
minclass = 3

# Maximum consecutive identical characters
maxrepeat = 3

# Maximum consecutive characters from same class
maxclassrepeat = 4

# Check against dictionary
dictcheck = 1

# Check if password contains username
usercheck = 1

# Enforce for root too
enforce_for_root
