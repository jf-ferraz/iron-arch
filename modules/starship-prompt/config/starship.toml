# Starship prompt configuration managed by Iron

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$rust\
$python\
$nodejs\
$golang\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
