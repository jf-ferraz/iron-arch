# Iron SSH Hardening Configuration
# Deployed by iron-arch ssh-hardening module

# Authentication
PermitRootLogin no
MaxAuthTries 3
MaxSessions 5
LoginGraceTime 30

# Disable unused authentication methods
PasswordAuthentication yes
PermitEmptyPasswords no
ChallengeResponseAuthentication no
KerberosAuthentication no
GSSAPIAuthentication no

# Modern Key Exchange Algorithms
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512

# Host Key Algorithms
HostKeyAlgorithms ssh-ed25519-cert-v01@openssh.com,sk-ssh-ed25519-cert-v01@openssh.com,ssh-ed25519,sk-ssh-ed25519@openssh.com

# Ciphers
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com

# MACs
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com

# Forwarding restrictions
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
DisableForwarding yes

# Security options
StrictModes yes
IgnoreRhosts yes
HostbasedAuthentication no

# Logging
SyslogFacility AUTHPRIV
LogLevel VERBOSE

# Banner
Banner /etc/ssh/iron-banner.txt

# SFTP
Subsystem sftp /usr/lib/ssh/sftp-server -f AUTHPRIV -l INFO
