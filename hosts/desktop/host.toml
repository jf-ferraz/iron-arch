# Desktop Host Configuration
# Main development workstation

id = "desktop"
name = "Desktop Workstation"
description = "Primary development machine"

[hardware]
cpu = "AMD Ryzen 9 7950X"
gpu = "NVIDIA RTX 4080"
ram_mb = 65536

[[hardware.monitors]]
output = "DP-1"
resolution = "2560x1440"
refresh_rate = 165
scale = 1.0

[[hardware.monitors]]
output = "HDMI-1"
resolution = "1920x1080"
refresh_rate = 60
scale = 1.0

[hardware]
chassis = "Desktop"

# Installed bundles
installed_bundles = ["hyprland", "niri"]
active_bundle = "hyprland"

# Installation parameters (for recovery)
[install_params]
bootloader = "SystemdBoot"
kernel = "linux"
microcode = "amd-ucode"
gpu_drivers = ["nvidia", "nvidia-utils", "nvidia-settings"]
filesystem = "btrfs"
encrypted = true

[[install_params.partitions]]
device = "/dev/nvme0n1p1"
mount_point = "/boot"
filesystem = "vfat"
size = "512M"

[[install_params.partitions]]
device = "/dev/nvme0n1p2"
mount_point = "/"
filesystem = "btrfs"
size = "remaining"
