version = 1
id = "packages"
name = "Packages Module"
kind = "package"
status = "draft"
owner = "laraj"
description = "Package sets and package-manager policy declarations."

[paths]
root = "modules/packages"
manifest = "app/manifests/update-policy.toml"

[[operations]]
id = "lint"
description = "Validate package module files and policy manifest presence."
command = "sh -c 'test -f app/manifests/update-policy.toml'"

[hooks]
pre_apply = []
post_apply = []
rollback = []
