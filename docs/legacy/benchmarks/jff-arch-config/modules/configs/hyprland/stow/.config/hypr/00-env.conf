# Environment and global behavior

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    layout = dwindle
    resize_on_border = true
    allow_tearing = false

    col.active_border = rgba(99c1f1ff)
    col.inactive_border = rgba(3a3f52ff)
}

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 5
        passes = 2
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000066)
    }
}

animations {
    enabled = true

    bezier = smooth,0.25,0.1,0.25,1.0
    animation = windows,1,5,smooth,slide
    animation = windowsOut,1,5,smooth,slide
    animation = border,1,8,smooth
    animation = fade,1,6,smooth
    animation = workspaces,1,5,smooth,slide
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}
