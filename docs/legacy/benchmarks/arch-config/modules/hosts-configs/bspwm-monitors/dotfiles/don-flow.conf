# =============================================================
# BSPWM Monitor Configuration - don-flow (Laptop)
# Description: Auto-detect monitor configuration for laptop
#
# This config uses AUTO_DETECT mode which will:
#   - Detect all connected monitors automatically
#   - Use the first monitor as primary
#   - Assign 5 workspaces to primary, 5 to secondary (if exists)
#   - Position secondary monitor to the right of primary
#
# To customize after installation:
#   1. Run 'xrandr' to find your monitor names
#   2. Edit this file with specific monitor names
#   3. Reload bspwm or run MonitorSetup manually
# =============================================================

# Enable auto-detection mode
AUTO_DETECT=true

# Optional: Define specific monitors (commented out for auto-detect)
# Uncomment and set these after running 'xrandr' on your laptop:
# MONITOR_MAIN="eDP-1"
# MONITOR_SEC="HDMI-1"

# Workspace assignments (space-separated) - used in both modes
MAIN_WORKSPACES="A B C D E"
SEC_WORKSPACES="F G H I J"

# Physical layout for secondary monitor
SEC_POSITION="right-of"
