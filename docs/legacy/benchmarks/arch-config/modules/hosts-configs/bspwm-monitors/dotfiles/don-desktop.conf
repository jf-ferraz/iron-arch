# =============================================================
# BSPWM Monitor Configuration - don-desktop
# Description: Dual monitor setup for desktop workstation
#
# Monitor Layout:
#   - DP-2 (Primary): 3440x1440 ultrawide - Workspaces A-E
#   - DP-1 (Secondary): 1920x1080 - Workspaces F-J
#
# Position: DP-1 is positioned to the left of DP-2
# =============================================================

# Monitor definitions
MONITOR_MAIN="DP-2"
MONITOR_SEC="DP-1"

# Workspace assignments (space-separated)
MAIN_WORKSPACES="A B C D E"
SEC_WORKSPACES="F G H I J"

# Physical layout
SEC_POSITION="left-of"

# Monitor order for bspc wm -O (space-separated, primary first)
MONITOR_ORDER="DP-2 DP-1"

# HDR Configuration
# DP-2 supports HDR - enable it for the primary monitor
HDR_MONITOR="DP-2"
HDR_ENABLE=true
